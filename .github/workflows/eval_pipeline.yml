name: LLM Eval Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"  # runs every Monday 9am UTC (weekly regression)

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run LLM eval suite
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          pytest tests/ \
            --html=reports/report.html \
            --self-contained-html \
            -v \
            --tb=short

      - name: Upload HTML report
        if: always()   # upload even if tests fail — important for debugging
        uses: actions/upload-artifact@v3
        with:
          name: eval-report
          path: reports/

      - name: Upload JSON summary
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: eval-summary-json
          path: reports/eval_summary.json
